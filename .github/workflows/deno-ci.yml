# This workflow will test on Deno lastest stable major
# see https://github.com/marketplace/actions/setup-deno for details
name: Deno CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # 2.0.5
        with:
          deno-version: vx.x.x # Run with latest stable Deno.
      - run: deno install
      - run: deno fmt --check
      - run: deno lint
      - run: deno test -A
