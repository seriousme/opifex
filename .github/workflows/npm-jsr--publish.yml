name: Publish Package to jsr and npmjs
on:
  release:
    types: [created]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # 2.0.5
        with:
          deno-version: vx.x.x # Run with latest stable Deno.
      - name: Update npm@11.16.0 # Ensure npm 11.16.0 is installed
        run: npm install -g npm@11.16.0
      - run: npm ci
      - run: deno install
      - run: npm run build
      - run: deno fmt
      - run: deno publish --set-version $(jq -r '.version' package.json)
      - run: npm stage publish --access public
